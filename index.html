<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora de Comisiones</title>
    <link rel="stylesheet" href="ventas.css">
    <script src="ventas.js"></script>
    <script src="utilitarios.js"></script>
</head>
<body>

    <div class="contenedor">
        <!-- Logo + Título -->
        <div class="header">
            <img src="icono.png" alt="Logo" class="logo">
            <h1>CORP. BANCARIA FB</h1>
            <h2>Calculadora de Comisiones</h2>
        </div>

        <label>Salario Base:</label>
        <input type="text" id="txtSueldoBase" onblur="validarInput('txtSueldoBase')">
        <div id="errorSueldoBase" class="error"></div>

        <label>Número de ventas:</label>
        <input type="text" id="txtVentas" onblur="validarInput('txtVentas')">
        <div id="errorVentas" class="error"></div>

        <label>Precio del producto:</label>
        <input type="text" id="txtPrecio" onblur="validarInput('txtPrecio')">
        <div id="errorPrecio" class="error"></div>


        <!-- NUEVO: Tipo de Datos / Categoría -->
        <label>Tipo de Venta:</label>
        <select id="tipoVenta" class="form-select">
            <option value="">Seleccione tipo de venta</option>
            <option value="normal">Venta Normal</option>
            <option value="premium">Venta Premium</option>
            <option value="corporativa">Venta Corporativa</option>
            <option value="recurrente">Cliente Recurrente</option>
        </select>

        <!-- NUEVO: Tipo de Datos / Categoría -->

        <!-- NUEVO: Montos Mínimo y Máximo -->
        <div class="montos-row">
            <div>
                <label>Meta Mínima</label>
                <input type="text" id="metaMin" value="$5,000" readonly>
            </div>
            <div>
                <label>Meta Máxima</label>
                <input type="text" id="metaMax" value="$50,000" readonly>
            </div>
        </div>

        <button onclick="calcular()">Calcular Comisión</button>

        <h2>Resultados</h2>
        <p>Salario Base: <span id="spSueldoBase"></span></p>
        <p>Comisión: <span id="spComision"></span></p>
        <p>Total: <span id="spTotal"></span></p>
    </div>

</body>
</html>
